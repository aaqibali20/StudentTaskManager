<script type="module">
  //  Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot, 
    deleteDoc, 
    doc 
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  //  Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCX5eXQ3Y6sr92XLrnWjOvdotfncXB_pcI",
    authDomain: "student-task-manager-89635.firebaseapp.com",
    projectId: "student-task-manager-89635",
    storageBucket: "student-task-manager-89635.firebasestorage.app",
    messagingSenderId: "1017924790163",
    appId: "1:1017924790163:web:2fd95b7a407e766402ea66"
  };

  //  Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  //  Elements
  const input = document.getElementById("taskInput");
  const btn = document.getElementById("addBtn");
  const taskList = document.getElementById("taskList");

  // ➕ Add Task
  async function addTask(text) {
    await addDoc(collection(db, "tasks"), {
      text: text,
      createdAt: Date.now()
    });
  }

  //  Delete Task
  async function deleteTask(id) {
    await deleteDoc(doc(db, "tasks", id));
  }

  //  Button click
  btn.addEventListener("click", () => {
    const value = input.value.trim();
    if (value !== "") {
      addTask(value);
      input.value = "";
    }
  });

  //  REAL-TIME LISTENER (MAIN MAGIC)
  onSnapshot(collection(db, "tasks"), (snapshot) => {
    taskList.innerHTML = "";

    snapshot.forEach((docItem) => {
      const li = document.createElement("li");

      // text
      li.textContent = docItem.data().text;

      // delete button
      const delBtn = document.createElement("button");
      delBtn.textContent = "❌";
      delBtn.style.marginLeft = "10px";

      delBtn.addEventListener("click", () => {
        deleteTask(docItem.id);
      });

      li.appendChild(delBtn);
      taskList.appendChild(li);
    });
  });
</script>
